<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - My Tasks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen">
    <div class="max-w-2xl mx-auto p-6">
        <h1 class="text-4xl font-bold text-center mb-8 text-sky-400">TaskFlow</h1>

        <div class="bg-slate-900 rounded-3xl p-6 mb-8">
            <input id="taskInput" type="text" placeholder="What needs to be done?"
                class="w-full bg-slate-800 text-white px-5 py-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-sky-500">
            <div class="flex gap-3 mt-4">
                <select id="priority" class="bg-slate-800 px-4 py-3 rounded-2xl">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
                <button onclick="addTask()" class="flex-1 bg-sky-500 hover:bg-sky-600 py-3 rounded-2xl font-semibold">
                    Add Task
                </button>
            </div>
        </div>

        <div id="taskList" class="space-y-3"></div>
    </div>

    <script>
        const apiUrl = 'http://localhost:5000/api/tasks';

        async function loadTasks() {
            const res = await fetch(apiUrl);
            const tasks = await res.json();
            renderTasks(tasks);
        }

        function renderTasks(tasks) {
            const container = document.getElementById('taskList');
            container.innerHTML = tasks.map(task => `
                <div class="bg-slate-900 rounded-2xl p-5 flex items-center gap-4 group">
                    <input type="checkbox" ${task.completed ? 'checked' : ''} 
                           onchange="toggleComplete(${task.id})" class="w-5 h-5 accent-sky-500">
                    <div class="flex-1">
                        <p class="${task.completed ? 'line-through text-slate-500' : ''}">${task.title}</p>
                        <div class="flex gap-2 text-xs mt-1">
                            <span class="px-3 py-1 rounded-full ${task.priority === 'high' ? 'bg-red-500/20 text-red-400' : task.priority === 'medium' ? 'bg-amber-500/20 text-amber-400' : 'bg-emerald-500/20 text-emerald-400'}">
                                ${task.priority}
                            </span>
                        </div>
                    </div>
                    <button onclick="deleteTask(${task.id})" 
                            class="text-red-400 hover:text-red-500 opacity-0 group-hover:opacity-100">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('priority').value;

            if (!input.value.trim()) return;

            await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: input.value, priority })
            });

            input.value = '';
            loadTasks();
        }

        async function toggleComplete(id) {
            await fetch(`${apiUrl}/${id}`, { method: 'PATCH' });
            loadTasks();
        }

        async function deleteTask(id) {
            await fetch(`${apiUrl}/${id}`, { method: 'DELETE' });
            loadTasks();
        }

        // Load tasks when page opens
        loadTasks();
    </script>
</body>

</html>
